name: Build and Push Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: hispanoautoacr.azurecr.io
  IMAGE_NAME: hispanoauto-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Trigger Container App update
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.ACR_PASSWORD }}" \
            "https://${{ env.REGISTRY }}/v2/${{ env.IMAGE_NAME }}/manifests/latest" \
            || echo "Image pushed - enable Continuous Deployment in Azure Portal for auto-deploy"
